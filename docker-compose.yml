version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mechlib-postgres
    environment:
      POSTGRES_USER: mechlib_user
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: mechlib_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mechlib_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mechlib-api
    environment:
      NODE_ENV: production
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mechlib_prod
      DB_USER: mechlib_user
      DB_PASSWORD: secure_password_change_me
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET not set}
      CORS_ORIGINS: https://yourdomain.com
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/backend/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mechlib-web
    environment:
      REACT_APP_BACKEND_URL: https://api.yourdomain.com
      REACT_APP_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mechlib-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
